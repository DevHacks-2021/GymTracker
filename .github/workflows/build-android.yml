name: 2. Build Android APK & AAB

# -------------------------------------------------------
# Configurare: setează variabilele de mai jos
# -------------------------------------------------------
env:
  APP_DIR: 'rummy-app'         # Directorul proiectului Cordova (schimbă dacă e altul)
  CORDOVA_VERSION: '12'        # Versiunea Cordova CLI
  ANDROID_PLATFORM_VERSION: '13' # Versiunea platformei Cordova Android
# -------------------------------------------------------

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install Cordova
        run: npm install -g cordova@${{ env.CORDOVA_VERSION }}

      - name: Add Android platform
        working-directory: ${{ env.APP_DIR }}
        run: cordova platform add android@${{ env.ANDROID_PLATFORM_VERSION }}

      - name: Build Debug APK
        working-directory: ${{ env.APP_DIR }}
        run: cordova build android --debug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ env.APP_DIR }}/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release AAB (nesemnat)
        working-directory: ${{ env.APP_DIR }}
        run: cordova build android --release -- --packageType=bundle

      - name: Upload Release AAB (nesemnat)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-unsigned
          path: ${{ env.APP_DIR }}/platforms/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 30

      # -------------------------------------------------------
      # Semnare AAB (activ doar dacă secretele sunt setate)
      # Setează în GitHub → Settings → Secrets and variables → Actions:
      #   KEYSTORE_BASE64     = keystore-ul codificat base64 (din workflow-ul de generare)
      #   KEYSTORE_PASSWORD   = parola keystore-ului
      #   KEY_ALIAS           = aliasul cheii (ex: my-app)
      #   KEY_PASSWORD        = parola cheii
      # -------------------------------------------------------
      - name: Semneaza AAB (dacă keystore-ul e configurat)
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
          ls -la release.keystore
          keytool -list -keystore release.keystore -storepass "$KEYSTORE_PASSWORD" -noprompt
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            ${{ env.APP_DIR }}/platforms/android/app/build/outputs/bundle/release/app-release.aab \
            "$KEY_ALIAS"

      - name: Upload AAB semnat
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-signed
          path: ${{ env.APP_DIR }}/platforms/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
