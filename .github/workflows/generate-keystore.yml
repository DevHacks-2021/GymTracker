name: 1. Generare Keystore (rulează O SINGURĂ DATĂ)

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Parola keystore (minim 6 caractere)'
        required: true
        type: string
      key_alias:
        description: 'Alias cheie (ex: my-app)'
        required: true
        default: 'my-app'
        type: string
      key_password:
        description: 'Parola cheie (poate fi aceeași ca parola keystore)'
        required: true
        type: string
      owner_name:
        description: 'Numele tău (ex: Ion Popescu)'
        required: true
        type: string
      organization:
        description: 'Organizație (poți pune numele tău din nou)'
        required: false
        default: 'MyOrg'
        type: string
      country_code:
        description: 'Cod țară (2 litere, ex: RO)'
        required: true
        default: 'RO'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generează keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias "${{ inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.key_password }}" \
            -dname "CN=${{ inputs.owner_name }}, O=${{ inputs.organization }}, C=${{ inputs.country_code }}"

      - name: Afișează KEYSTORE_BASE64 (copiază în GitHub Secrets)
        run: |
          echo "====== COPIAZA TEXTUL DE MAI JOS IN SECRETS > KEYSTORE_BASE64 ======"
          base64 -w 0 release.keystore
          echo ""
          echo "======================================================================"

      - name: Salvează keystore ca artifact (descarcă și păstrează-l în siguranță!)
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: release.keystore
          retention-days: 1
