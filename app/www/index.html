<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Cum te simți?</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ECRAN: CHECK-IN ZILNIC -->
  <div id="screen-checkin" class="screen active">
    <div class="header">
      <span class="header-title">Cum te simți?</span>
      <button class="btn-icon" onclick="show('screen-history')" title="Istoric">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
      </button>
    </div>

    <div class="content">
      <div class="date-badge" id="today-label"></div>

      <div class="mood-section">
        <p class="section-label">Selectează starea ta</p>
        <div class="mood-grid" id="mood-grid">
          <button class="mood-btn" data-mood="5" onclick="selectMood(5)">
            <span class="mood-emoji">😄</span>
            <span class="mood-label">Excelent</span>
          </button>
          <button class="mood-btn" data-mood="4" onclick="selectMood(4)">
            <span class="mood-emoji">🙂</span>
            <span class="mood-label">Bine</span>
          </button>
          <button class="mood-btn" data-mood="3" onclick="selectMood(3)">
            <span class="mood-emoji">😐</span>
            <span class="mood-label">Neutru</span>
          </button>
          <button class="mood-btn" data-mood="2" onclick="selectMood(2)">
            <span class="mood-emoji">😕</span>
            <span class="mood-label">Prost</span>
          </button>
          <button class="mood-btn" data-mood="1" onclick="selectMood(1)">
            <span class="mood-emoji">😞</span>
            <span class="mood-label">Foarte prost</span>
          </button>
        </div>
      </div>

      <div class="note-section">
        <p class="section-label">Notă opțională</p>
        <textarea id="note-input" class="note-input" placeholder="Cum a fost ziua ta? Ce simți?" maxlength="500"></textarea>
        <span class="char-count" id="char-count">0 / 500</span>
      </div>

      <button class="btn-primary" onclick="saveCheckin()">Salvează</button>

      <div id="saved-today" class="saved-today" style="display:none;">
        <div class="saved-badge">✓ Salvat astăzi</div>
        <div class="saved-mood" id="saved-mood-display"></div>
        <button class="btn-secondary" onclick="editToday()">Modifică</button>
      </div>
    </div>
  </div>

  <!-- ECRAN: ISTORIC -->
  <div id="screen-history" class="screen">
    <div class="header">
      <button class="btn-icon" onclick="show('screen-checkin')" title="Înapoi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="header-title">Istoric</span>
      <button class="btn-icon" onclick="show('screen-stats')" title="Statistici">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
    </div>
    <div class="content">
      <div id="history-list" class="history-list"></div>
      <div id="history-empty" class="empty-state" style="display:none;">
        <p>Nicio înregistrare încă.</p>
        <p>Începe prin a salva prima ta stare!</p>
      </div>
    </div>
  </div>

  <!-- ECRAN: STATISTICI -->
  <div id="screen-stats" class="screen">
    <div class="header">
      <button class="btn-icon" onclick="show('screen-history')" title="Înapoi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="header-title">Statistici</span>
      <span></span>
    </div>
    <div class="content" id="stats-content"></div>
  </div>

  <!-- MODAL DETALII -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="modal-date"></span>
        <button class="btn-icon" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-mood" id="modal-mood"></div>
        <p class="modal-note" id="modal-note"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary btn-danger" onclick="deleteEntry()">Șterge</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
